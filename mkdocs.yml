site_name: OpenJDK 社区日报
site_description: 由 GitHub Actions 和 AI 自动生成的 OpenJDK PR 每日技术简报
site_author: OpenJDK Daily Bot

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - 首页: index.md
  - 日报归档: reports/index.md
  - 关于: about.md

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true

extra:
  generator: false
